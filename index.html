<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Draw Tarot</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-label="tarot draw stage">
        <div class="deck-area">
          <div id="deck" class="deck"></div>
        </div>
        <div id="result" class="result" aria-live="polite">
          <img id="resultImage" alt="">
        </div>
      </section>

      <section class="controls">
        <label>
          上から
          <input id="pickNumber" type="number" min="1" max="22" value="7">
          番目
        </label>
        <button id="drawButton" type="button">シャッフルして引く</button>
        <p id="status">大アルカナ22枚</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
