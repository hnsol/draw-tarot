<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Draw Tarot</title>
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-label="tarot draw stage">
        <div class="deck-area">
          <div id="deck" class="deck"></div>
          <section id="promptNote" class="prompt-note" aria-label="カードを引く前の問い">
            <p>見つめたい問いを、ひとつだけ心に置いてカードを引いてください。</p>
            <p class="prompt-note__example">問いの例</p>
            <ul>
              <li>この件で、自分は何を見逃しているか？</li>
              <li>この選択で、何を大切にしたいか？</li>
              <li>今日の自分に必要な視点は何か？</li>
            </ul>
          </section>
        </div>
      </section>

      <section class="controls">
        <label>
          上から
          <input id="pickNumber" type="number" min="1" max="22" value="7">
          番目
        </label>
        <button id="drawButton" type="button">シャッフルして引く</button>
      </section>

      <div id="result" class="result" aria-live="polite">
        <img id="resultImage" alt="">
      </div>

      <section id="meaningSection" class="meaning" hidden>
        <h2 id="meaningTitle"></h2>
        <article>
          <h3>絵柄の解説</h3>
          <p id="meaningImage"></p>
        </article>
        <article>
          <h3>ポジティブなキーワード</h3>
          <p id="meaningPositive"></p>
        </article>
        <article>
          <h3>ネガティブなキーワード</h3>
          <p id="meaningNegative"></p>
        </article>
        <article>
          <h3>生命の樹での位置づけ</h3>
          <p id="meaningTree"></p>
        </article>
      </section>
    </main>

    <script src="assets/js/card-meanings.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
